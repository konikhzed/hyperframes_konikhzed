<div id="konikhzed-stage" data-composition-id="konikhzed-golden" data-width="1920" data-height="1080" data-start="0" data-duration="15">

  <!-- Background SVG Pattern with Golden Ratio -->
  <svg id="golden-bg" class="clip" width="100%" height="100%" data-start="0" data-duration="15" style="position:absolute;">
    <!-- SVG generated by your SVG-konikhzed logic will be injected here -->
  </svg>

  <h1 id="title" class="clip" data-start="1" data-duration="8" style="font-size: 120px; color: #ffd700; text-shadow: 0 0 40px rgba(255,215,0,0.8);">
    Konikhzed
  </h1>

  <!-- Weather / Fayton Integration -->
  <div id="fayton-overlay" class="clip" data-start="6" data-duration="9">
    <!-- Dynamic weather visualization using Konikhzed numbers -->
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script>
    const phi = 1.6180339887;
    const konikhzedNumbers = [16.3248, 8.1624, 5.4425, 4.0819, 3.2655];

    const tl = gsap.timeline({ paused: true });
    
    // Golden Ratio based animations
    tl.from("#title", { 
      scale: 0.618, 
      rotation: -phi * 10, 
      opacity: 0, 
      duration: 2.5, 
      ease: "power2.out" 
    }, 1);

    // Layered SVG pattern animation
    konikhzedNumbers.forEach((num, i) => {
      tl.to(`#layer-${i}`, {
        opacity: 0.8,
        scale: phi ** (i % 3),
        duration: num / 8,
        repeat: -1,
        yoyo: true
      }, 2 + i * 0.8);
    });

    window.__timelines = window.__timelines || {};
    window.__timelines.konikhzed = tl;
  </script>
</div>
